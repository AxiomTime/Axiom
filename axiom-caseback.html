<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM — The Caseback · timebyaxiom.com</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8920a;
    --gold-light: #f0c040;
    --steel: #8a9bb5;
    --void: #000000;
    --white: #e8edf5;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background:var(--void);
    color:var(--white);
    font-family:'Rajdhani',sans-serif;
    overflow-x:hidden;
  }

  .starfield {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(1px 1px at 12% 18%, rgba(200,146,10,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 42%, rgba(255,255,255,0.22) 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 9%,  rgba(200,146,10,0.28) 0%, transparent 100%),
      radial-gradient(1px 1px at 58% 28%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 74% 58%, rgba(200,146,10,0.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 87% 14%, rgba(255,255,255,0.32) 0%, transparent 100%),
      radial-gradient(1px 1px at 18% 82%, rgba(255,255,255,0.16) 0%, transparent 100%),
      radial-gradient(1px 1px at 52% 91%, rgba(200,146,10,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 68%, rgba(255,255,255,0.2)  0%, transparent 100%),
      radial-gradient(1px 1px at 7%  58%, rgba(200,146,10,0.12) 0%, transparent 100%);
  }

  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding:22px 40px;
    background:rgba(0,0,0,0.88);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(200,146,10,0.07);
  }

  .nav-brand {
    font-family:'Cinzel',serif;
    font-size:13px; font-weight:900;
    letter-spacing:0.55em;
    color:rgba(200,146,10,0.7);
    text-decoration:none;
    padding-right:0.55em;
  }

  .nav-links { display:flex; gap:28px; list-style:none; }

  .nav-links a {
    font-family:'Cinzel',serif;
    font-size:9px; letter-spacing:0.4em;
    color:rgba(138,155,181,0.4);
    text-decoration:none; text-transform:uppercase;
    transition:color 0.3s;
  }

  .nav-links a:hover,
  .nav-links a.active { color:rgba(200,146,10,0.75); }

  .hero {
    position:relative; z-index:10;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:100px 20px 60px;
    text-align:center;
    overflow:hidden;
  }

  .hero::before {
    content:'';
    position:absolute;
    width:700px; height:700px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(200,146,10,0.07) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .hero-eyewrap {
    position:relative; z-index:2;
    width:min(500px, 90vw);
    height:min(500px, 90vw);
    margin:0 auto 52px;
    opacity:0;
    animation:fade-in 1.4s ease 0.4s both;
  }

  .caseback-rotate {
    width:100%; height:100%;
    filter:drop-shadow(0 0 40px rgba(200,146,10,0.22))
           drop-shadow(0 0 80px rgba(200,146,10,0.08));
  }

  .hero-label {
    position:relative; z-index:2;
    font-family:'Rajdhani',sans-serif;
    font-size:9px; letter-spacing:0.7em;
    color:rgba(200,146,10,0.35);
    text-transform:uppercase;
    margin-bottom:20px;
    opacity:0;
    animation:fade-up 1s ease 0.2s both;
  }

  .hero-statement {
    position:relative; z-index:2;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:clamp(20px,3.5vw,32px);
    font-weight:300;
    color:rgba(232,237,245,0.82);
    letter-spacing:0.06em;
    line-height:1.7;
    max-width:520px;
    opacity:0;
    animation:fade-up 1.1s ease 1.6s both;
  }

  .hero-statement em { color:rgba(200,146,10,0.8); font-style:italic; }

  .hover-hint {
    position:relative; z-index:2;
    font-family:'Rajdhani',sans-serif;
    font-size:8px; letter-spacing:0.55em;
    color:rgba(138,155,181,0.25);
    text-transform:uppercase;
    margin-top:22px;
    opacity:0;
    animation:fade-up 1s ease 2.2s both;
  }

  .private-statement {
    position:relative; z-index:10;
    text-align:center;
    padding:80px 30px;
    border-top:1px solid rgba(200,146,10,0.07);
    border-bottom:1px solid rgba(200,146,10,0.07);
    opacity:0; transform:translateY(20px);
    transition:opacity 1s ease, transform 1s ease;
  }

  .private-statement.visible { opacity:1; transform:translateY(0); }

  .private-statement .headline {
    font-family:'Cinzel',serif;
    font-size:clamp(13px,2vw,17px);
    font-weight:400;
    letter-spacing:0.35em;
    color:rgba(200,146,10,0.55);
    line-height:2.2;
    max-width:580px;
    margin:0 auto;
  }

  .anatomy {
    position:relative; z-index:10;
    max-width:900px;
    margin:0 auto;
    padding:80px 30px;
    opacity:0; transform:translateY(24px);
    transition:opacity 1s ease 0.1s, transform 1s ease 0.1s;
  }

  .anatomy.visible { opacity:1; transform:translateY(0); }

  .anatomy-label {
    font-family:'Rajdhani',sans-serif;
    font-size:9px; letter-spacing:0.65em;
    color:rgba(200,146,10,0.3);
    text-transform:uppercase;
    text-align:center;
    margin-bottom:52px;
  }

  .anatomy-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:1px;
  }

  .anatomy-item {
    padding:36px 32px;
    border:1px solid rgba(138,155,181,0.06);
    background:rgba(5,6,10,0.9);
  }

  .anatomy-item .a-label {
    font-family:'Rajdhani',sans-serif;
    font-size:8px; letter-spacing:0.55em;
    color:rgba(200,146,10,0.35);
    text-transform:uppercase;
    margin-bottom:10px;
  }

  .anatomy-item .a-value {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(15px,2vw,18px);
    font-weight:300;
    color:rgba(232,237,245,0.82);
    line-height:1.7;
    letter-spacing:0.03em;
  }

  .anatomy-item .a-value em {
    font-style:italic;
    color:rgba(200,146,10,0.7);
  }

  .inscriptions {
    position:relative; z-index:10;
    max-width:760px;
    margin:0 auto;
    padding:0 30px 80px;
    opacity:0; transform:translateY(24px);
    transition:opacity 1s ease 0.15s, transform 1s ease 0.15s;
  }

  .inscriptions.visible { opacity:1; transform:translateY(0); }

  .inscription-label {
    font-family:'Rajdhani',sans-serif;
    font-size:9px; letter-spacing:0.65em;
    color:rgba(200,146,10,0.3);
    text-transform:uppercase;
    text-align:center;
    margin-bottom:44px;
  }

  .inscription-row {
    display:grid;
    grid-template-columns:100px 1fr;
    border-bottom:1px solid rgba(138,155,181,0.08);
    padding:44px 0;
  }

  .inscription-row:first-of-type {
    border-top:1px solid rgba(138,155,181,0.08);
  }

  .inscription-chapter {
    font-family:'Cinzel',serif;
    font-size:10px; letter-spacing:0.3em;
    padding-right:24px;
    padding-top:3px;
  }

  .c001 { color:rgba(200,146,10,0.65); }
  .c002 { color:rgba(26,143,255,0.65); }
  .c003 { color:rgba(245,230,200,0.6); }

  .inscription-name {
    font-family:'Cinzel',serif;
    font-size:14px; letter-spacing:0.2em;
    margin-bottom:12px;
  }

  .c001 .inscription-name { color:rgba(200,146,10,0.8); }
  .c002 .inscription-name { color:rgba(26,143,255,0.8); }
  .c003 .inscription-name { color:rgba(245,230,200,0.75); }

  .inscription-text {
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:14px;
    line-height:1.9;
    color:rgba(138,155,181,0.5);
    letter-spacing:0.04em;
  }

  .inscription-meta {
    display:block;
    font-style:normal;
    font-family:'Rajdhani',sans-serif;
    font-size:8px;
    letter-spacing:0.45em;
    color:rgba(200,146,10,0.25);
    text-transform:uppercase;
    margin-top:10px;
  }

  .cnc-block {
    position:relative; z-index:10;
    max-width:680px;
    margin:0 auto;
    padding:0 30px 100px;
    opacity:0; transform:translateY(20px);
    transition:opacity 1s ease 0.1s, transform 1s ease 0.1s;
  }

  .cnc-block.visible { opacity:1; transform:translateY(0); }

  .cnc-header {
    font-family:'Rajdhani',sans-serif;
    font-size:9px; letter-spacing:0.65em;
    color:rgba(200,146,10,0.3);
    text-transform:uppercase;
    text-align:center;
    margin-bottom:36px;
  }

  .cnc-box {
    border:1px solid rgba(200,146,10,0.14);
    padding:36px 36px 28px;
    background:rgba(200,146,10,0.015);
    position:relative;
  }

  .cnc-box::before, .cnc-box::after {
    content:'';
    position:absolute;
    width:16px; height:16px;
    border-color:rgba(200,146,10,0.4);
    border-style:solid;
  }
  .cnc-box::before { top:-1px; left:-1px; border-width:1px 0 0 1px; }
  .cnc-box::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }

  .cnc-row {
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:12px 0;
    border-bottom:1px solid rgba(138,155,181,0.05);
    gap:20px;
  }

  .cnc-row:last-child { border-bottom:none; }

  .cnc-key {
    font-family:'Rajdhani',sans-serif;
    font-size:9px; letter-spacing:0.45em;
    color:rgba(138,155,181,0.35);
    text-transform:uppercase;
    white-space:nowrap;
    flex-shrink:0;
  }

  .cnc-val {
    font-family:'Cormorant Garamond',serif;
    font-size:15px;
    color:rgba(232,237,245,0.75);
    text-align:right;
    letter-spacing:0.04em;
  }

  .cnc-val em { font-style:italic; color:rgba(200,146,10,0.65); }

  .closing {
    position:relative; z-index:10;
    text-align:center;
    padding:60px 30px 90px;
    border-top:1px solid rgba(138,155,181,0.05);
  }

  .closing p {
    font-family:'Cinzel',serif;
    font-size:clamp(11px,1.5vw,13px);
    letter-spacing:0.4em;
    color:rgba(200,146,10,0.28);
    line-height:2.8;
  }

  .closing a {
    color:rgba(200,146,10,0.5);
    text-decoration:none;
    letter-spacing:0.4em;
    transition:color 0.3s;
  }

  .closing a:hover { color:rgba(200,146,10,0.9); }

  footer {
    position:relative; z-index:10;
    text-align:center;
    padding:40px 20px;
    border-top:1px solid rgba(138,155,181,0.04);
  }

  .footer-brand {
    font-family:'Cinzel',serif;
    font-size:15px; font-weight:900;
    letter-spacing:0.6em;
    color:rgba(200,146,10,0.18);
    padding-right:0.6em;
  }

  footer p {
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:12px;
    color:rgba(138,155,181,0.16);
    letter-spacing:0.2em;
    line-height:2.2;
    margin-top:9px;
  }

  @keyframes fade-in  { from{opacity:0} to{opacity:1} }
  @keyframes fade-up  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slow-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes pulse-node { 0%,100%{opacity:0.35} 50%{opacity:1} }

  .node-pulse   { animation:pulse-node 2.4s ease-in-out infinite; }
  .node-pulse-2 { animation:pulse-node 2.4s ease-in-out infinite 0.8s; }

  @media (max-width:640px) {
    nav { padding:18px 20px; }
    .nav-links { gap:14px; }
    .nav-links a { font-size:8px; letter-spacing:0.25em; }
    .anatomy-grid { grid-template-columns:1fr; }
    .cnc-box { padding:24px 20px 18px; }
    .cnc-row { flex-direction:column; gap:4px; }
    .cnc-val { text-align:left; }
  }

  @media (prefers-reduced-motion:reduce) {
    .caseback-rotate { animation:none; }
    .anatomy, .inscriptions, .cnc-block, .private-statement { opacity:1; transform:none; transition:none; }
  }
</style>
</head>
