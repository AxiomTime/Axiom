<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }

.gate {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  background:#000;
  padding:40px 30px;
}

.starfield {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(1px 1px at 10% 15%, rgba(200,146,10,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 8%,  rgba(200,146,10,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 25%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 55%, rgba(200,146,10,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.2) 0%, transparent 100%);
}

.content {
  position:relative; z-index:10;
  text-align:center;
  animation: fadeIn 1.8s ease both;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.eye {
  width:54px; height:32px;
  margin:0 auto 28px;
}

.brand {
  font-family:'Cinzel', serif;
  font-size:clamp(38px, 10vw, 72px);
  font-weight:900;
  letter-spacing:0.55em;
  padding-right:0.55em;
  background:linear-gradient(135deg, #6a4400 0%, #c8920a 30%, #f0c040 55%, #e8edf5 75%, #c8920a 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
  margin-bottom:12px;
}

.scripture {
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(13px, 2vw, 16px);
  color:rgba(200,146,10,0.55);
  letter-spacing:0.2em;
  margin-bottom:52px;
}

.input-wrap {
  position:relative;
  margin-bottom:16px;
}

input[type="password"] {
  width:280px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(200,146,10,0.3);
  color:rgba(232,237,245,0.9);
  font-family:'Rajdhani', sans-serif;
  font-size:14px;
  letter-spacing:0.2em;
  padding:14px 20px;
  outline:none;
  text-align:center;
  transition:border-color 0.3s;
}

input[type="password"]:focus {
  border-color:rgba(200,146,10,0.7);
}

input[type="password"]::placeholder {
  color:rgba(138,155,181,0.3);
  letter-spacing:0.3em;
}

button {
  display:block;
  width:280px;
  background:transparent;
  border:1px solid rgba(200,146,10,0.4);
  color:rgba(200,146,10,0.8);
  font-family:'Cinzel', serif;
  font-size:9px;
  letter-spacing:0.6em;
  padding:14px 20px;
  cursor:pointer;
  transition:border-color 0.3s, color 0.3s;
  text-transform:uppercase;
}

button:hover {
  border-color:rgba(200,146,10,0.8);
  color:rgba(200,146,10,1);
}

.error {
  font-family:'Rajdhani', sans-serif;
  font-size:9px;
  letter-spacing:0.4em;
  color:rgba(200,80,80,0.7);
  text-transform:uppercase;
  margin-top:16px;
  height:14px;
  transition:opacity 0.3s;
}
</style>
</head>
<body>

<div class="starfield"></div>

<div class="gate">
  <div class="content">

    <div class="eye">
      <svg viewBox="0 0 64 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="19" rx="31" ry="18" stroke="url(#eyeG)" stroke-width="1"/>
        <circle cx="32" cy="19" r="7.5" fill="none" stroke="#c8920a" stroke-width="0.8" opacity="0.7"/>
        <circle cx="32" cy="19" r="3" fill="#c8920a" opacity="0.85"/>
        <line x1="32" y1="19" x2="8" y2="19" stroke="#c8920a" stroke-width="0.5" opacity="0.4"/>
        <line x1="32" y1="19" x2="56" y2="19" stroke="#c8920a" stroke-width="0.5" opacity="0.4"/>
        <defs>
          <linearGradient id="eyeG" x1="0" y1="0" x2="64" y2="38">
            <stop offset="0%" stop-color="#c8920a"/>
            <stop offset="100%" stop-color="#f0c040"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="brand">AXIOM</div>
    <div class="scripture">Before I formed you in the womb I knew you — Jeremiah 1:5</div>

    <div class="input-wrap">
      <input type="password" id="pw" placeholder="ENTER PASSWORD" onkeydown="if(event.key==='Enter')check()" autocomplete="off" />
    </div>
    <button onclick="check()">Enter</button>
    <div class="error" id="err"></div>

  </div>
</div>

<script>
function check() {
  const val = document.getElementById('pw').value;
  const err = document.getElementById('err');
  if (val === 'AxiomFaith44*') {
    window.location.href = 'axiom-manifesto.html';
  } else {
    err.textContent = 'Access denied';
    document.getElementById('pw').value = '';
    setTimeout(() => { err.textContent = ''; }, 2000);
  }
}
</script>

</body>
</html>
